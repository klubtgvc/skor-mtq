<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Layar Proyektor MTQ</title>
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Margin diperkecil agar ruang tabel lebih lega */
        body { font-family: 'Calibri', 'Arial', sans-serif; background-color: #ffffff; margin: 0.5vw 1vw; display: flex; flex-direction: column; align-items: center; }
        
        /* Judul dibuat sedikit lebih rapat */
        .main-title { text-align: center; font-size: 2.4vw; font-weight: bold; color: #000; margin-top: 0; margin-bottom: 1vw; text-transform: uppercase; line-height: 1.1; border-bottom: 0.3vw double #000; padding-bottom: 0.5vw; width: 100%; }
        
        .board-container { display: flex; gap: 0.8vw; width: 100%; justify-content: center; }
        .team-wrapper { flex: 1; border: 0.2vw solid #000; box-shadow: 0 0.4vw 1vw rgba(0,0,0,0.2); overflow: hidden; }
        .team-header { text-align: center; font-size: 2vw; font-weight: bold; padding: 0.6vw 0.5vw; border-bottom: 0.2vw solid #000; }
        
        .header-a { background-color: #ffff00; color: #000; }
        .header-b { background-color: #ff0000; color: #fff; }
        .header-c { background-color: #002060; color: #fff; }
        .header-d { background-color: #00b050; color: #fff; }

        table { width: 100%; border-collapse: collapse; text-align: center; table-layout: fixed; }
        th:nth-child(1) { width: 12%; } 
        th:nth-child(2) { width: 29.33%; } 
        th:nth-child(3) { width: 29.33%; } 
        th:nth-child(4) { width: 29.33%; } 
        
        /* TINGGI BARIS DIPERKECIL (dari 3.5vw menjadi 2.6vw) */
        th, td { border: 0.15vw solid #000; height: 2.6vw; padding: 0; font-weight: bold; }
        th { background-color: #9bc2e6; font-size: 1vw; padding: 0.3vw 0; }
        td.col-no { background-color: #9bc2e6; font-size: 1.3vw; }
        
        /* Ukuran angka disesuaikan agar pas dengan baris yang mengecil */
        .val-cell { color: #000; font-size: 1.8vw; }
        .total-row { background-color: #d9d9d9; height: 3.5vw; }
        .total-label { text-align: right; padding-right: 1vw; font-size: 1.4vw; }
        .total-score { color: #c00000; font-size: 2.6vw; }

        /* Tombol Fullscreen */
        #fsBtn {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
            transition: 0.3s;
        }
        #fsBtn:hover { background: rgba(0, 0, 0, 0.8); }
    </style>
</head>
<body>

    <div class="main-title">
        LIVE PAPAN SKOR FAHMIL QUR'AN<br>
        MTQ KE-XXX DAYAH MUTIDI 1448H/2026M
    </div>
    
    <div class="board-container" id="boardContainer"></div>

    <button id="fsBtn" onclick="toggleFullScreen()">🔲 Fullscreen</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAt9d4sQPzc_IoJi_U_gXSbjiZQkBmoYzc",
            authDomain: "skor-mtq.firebaseapp.com",
            databaseURL: "https://skor-mtq-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "skor-mtq",
            storageBucket: "skor-mtq.firebasestorage.app",
            messagingSenderId: "2896206863",
            appId: "1:2896206863:web:638b010919af67ac45977a",
            measurementId: "G-S8CCS4HWQS"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('skorMutidi'); 

        const teams = [
            { id: 'A', name: 'REGU A', class: 'header-a' },
            { id: 'B', name: 'REGU B', class: 'header-b' },
            { id: 'C', name: 'REGU C', class: 'header-c' },
            { id: 'D', name: 'REGU D', class: 'header-d' }
        ];
        const cols = ['p', 'l', 'r']; 

        function buildTable() {
            let html = '';
            teams.forEach(team => {
                html += `<div class="team-wrapper"><div class="team-header ${team.class}">${team.name}</div><table><thead><tr><th>NO.</th><th>PEMERATAAN</th><th>LEMPAR</th><th>REBUTAN</th></tr></thead><tbody>`;
                for (let i = 1; i <= 14; i++) {
                    html += `<tr><td class="col-no">${i}</td>`;
                    cols.forEach(c => { html += `<td class="val-cell" id="display-${team.id}-${i}-${c}"></td>`; });
                    html += `</tr>`;
                }
                html += `<tr class="total-row"><td colspan="2" class="total-label">TOTAL:</td><td colspan="2" class="total-score" id="total-${team.id}">0</td></tr></tbody></table></div>`;
            });
            document.getElementById('boardContainer').innerHTML = html;
        }

        function updateScreen(data, totals) {
            document.querySelectorAll('.val-cell').forEach(c => c.innerText = '');
            if(data) {
                for (let key in data) {
                    let displayId = key.replace('input', 'display');
                    let el = document.getElementById(displayId);
                    if (el) el.innerText = data[key];
                }
            }
            if(totals) {
                teams.forEach(team => {
                    let totalEl = document.getElementById(`total-${team.id}`);
                    if (totalEl) totalEl.innerText = totals[team.id];
                });
            }
        }

        buildTable();

        dbRef.on('value', (snapshot) => {
            const dbData = snapshot.val();
            if(dbData) {
                updateScreen(dbData.tableData, dbData.totals);
            } else {
                updateScreen({}, { A: 0, B: 0, C: 0, D: 0 });
            }
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Gagal membuka mode fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
