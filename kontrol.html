<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Operator MTQ - Real-Time</title>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Calibri', 'Arial', sans-serif; background-color: #e9ecef; margin: 15px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1500px; width: 100%; }
        .header-title { text-align: center; font-size: 1.8rem; font-weight: bold; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #ddd; }
        
        .teams-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .team-ctrl { border: 2px solid #ddd; border-radius: 8px; background: #f8f9fa; overflow: hidden; height: 100%; }
        .team-ctrl h3 { margin: 0; font-size: 1.8rem; padding: 15px; text-align: center; color: #000; }
        
        .hdr-a { background-color: #ffff00; border-bottom: 2px solid #ccc;}
        .hdr-b { background-color: #ff0000; color: #fff !important; border-bottom: 2px solid #ccc;}
        .hdr-c { background-color: #002060; color: #fff !important; border-bottom: 2px solid #ccc;}
        .hdr-d { background-color: #00b050; color: #fff !important; border-bottom: 2px solid #ccc;}

        .babak-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .babak-col { display: flex; flex-direction: column; gap: 5px; background: #fff; border: 1px solid #ddd; padding: 5px; border-radius: 5px; justify-content: flex-start; }
        .babak-title { text-align: center; font-size: 0.95rem; font-weight: bold; background: #9bc2e6; padding: 5px 0; margin-bottom: 5px; border-radius: 3px; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-row-full { display: grid; grid-template-columns: 1fr; gap: 5px; } 
        .s-btn { padding: 10px 0; border: none; border-radius: 4px; color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .s-btn:active { transform: scale(0.92); }
        .b-plus { background: #28a745; } 
        .b-min { background: #dc3545; }  
        .b-del { background: #6c757d; width: 100%; margin-top: auto; padding: 8px 0; } 

        .preview-section { margin-top: 30px; border-top: 3px dashed #ccc; padding-top: 20px; }
        .preview-title { text-align: center; font-size: 1.5rem; font-weight: bold; color: #333; margin-bottom: 15px; }
        .preview-container { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .preview-wrapper { flex: 1; border: 2px solid #000; background: #fff; }
        .preview-header { text-align: center; font-size: 18px; font-weight: bold; padding: 10px 5px; border-bottom: 2px solid #000; }
        .preview-wrapper table { width: 100%; border-collapse: collapse; text-align: center; }
        .preview-wrapper th, .preview-wrapper td { border: 1px solid #000; height: 26px; padding: 0; font-size: 14px; font-weight: bold; }
        .preview-wrapper th { background-color: #9bc2e6; font-size: 11px; }
        .preview-wrapper td.col-no { background-color: #9bc2e6; width: 25px; }
        .val-cell { color: #000; }
        .total-row { background-color: #d9d9d9; font-size: 16px; height: 35px; }

        .btn-reset-all { display: block; margin: 20px auto 10px; padding: 15px 30px; font-size: 1.2rem; background: #dc3545; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; }
        
        #statusKoneksi { text-align: center; font-weight: bold; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .konek { background-color: #d4edda; color: #155724; }
        .diskonek { background-color: #f8d7da; color: #721c24; }

        /* GAYA UNTUK FITUR SIMPAN & MUAT */
        .session-manager { margin-top: 25px; padding: 15px; background: #e3f2fd; border: 2px solid #90caf9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .session-title { font-size: 1.3rem; font-weight: bold; color: #0d47a1; margin: 0; }
        .session-controls { display: flex; gap: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .btn-save { padding: 12px 20px; font-size: 1.1rem; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; min-width: 200px; }
        .session-select { padding: 10px; font-size: 1.1rem; border-radius: 6px; border: 1px solid #ccc; flex: 2; min-width: 200px; }
        .btn-load { padding: 12px 20px; font-size: 1.1rem; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; min-width: 150px; }
        .btn-save:active, .btn-load:active { transform: scale(0.95); }

        /* KODE RESPONSIF UNTUK HP / IPHONE */
        @media (max-width: 900px) {
            .teams-grid { grid-template-columns: repeat(2, 1fr); } 
            .preview-container { flex-wrap: wrap; }
            .preview-wrapper { min-width: 45%; }
        }

        @media (max-width: 600px) {
            body { margin: 5px; }
            .dashboard { padding: 8px; }
            .header-title { font-size: 1.2rem; margin-bottom: 10px; padding-bottom: 5px; }
            .teams-grid { grid-template-columns: 1fr; gap: 10px; } 
            .team-ctrl h3 { font-size: 1.3rem; padding: 8px; }
            .babak-container { gap: 3px; padding: 5px; }
            .babak-col { padding: 4px; gap: 3px; }
            .babak-title { font-size: 0.75rem; padding: 4px 0; margin-bottom: 2px; }
            .btn-row, .btn-row-full { gap: 3px; }
            .s-btn { padding: 10px 0; font-size: 0.95rem; } 
            .preview-container { flex-direction: column; }
            .preview-wrapper { width: 100%; margin-bottom: 10px; }
            .session-controls { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header-title">💻 PANEL OPERATOR (Otomatis & Real-Time)</div>
        <div id="statusKoneksi" class="diskonek">Menghubungkan ke Server Firebase...</div>

        <div class="teams-grid" id="teamsContainer"></div>

        <div class="session-manager">
            <h4 class="session-title">📂 Manajemen Data Pertandingan</h4>
            <div class="session-controls">
                <button class="btn-save" onclick="simpanSesiPertandingan()">💾 Simpan Hasil Saat Ini</button>
                <select id="daftarSesi" class="session-select">
                    <option value="">-- Pilih Data Lama Untuk Ditampilkan --</option>
                </select>
                <button class="btn-load" onclick="muatSesiPertandingan()">Tampilkan ke Layar 🚀</button>
            </div>
        </div>

        <button class="btn-reset-all" onclick="resetAll()">🔄 Reset Seluruh Skor & Kosongkan Layar</button>

        <div class="preview-section">
            <div class="preview-title">📺 LAYAR PROYEKTOR SAAT INI :</div>
            <div class="preview-container" id="previewContainer"></div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAt9d4sQPzc_IoJi_U_gXSbjiZQkBmoYzc",
            authDomain: "skor-mtq.firebaseapp.com",
            databaseURL: "https://skor-mtq-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "skor-mtq",
            storageBucket: "skor-mtq.firebasestorage.app",
            messagingSenderId: "2896206863",
            appId: "1:2896206863:web:638b010919af67ac45977a",
            measurementId: "G-S8CCS4HWQS"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('skorMutidi');
        const dbHistory = db.ref('skorMutidi_Riwayat'); 

        const connectedRef = firebase.database().ref(".info/connected");
        connectedRef.on("value", (snap) => {
            const statusEl = document.getElementById("statusKoneksi");
            if (snap.val() === true) {
                statusEl.textContent = "🟢 Terhubung ke Cloud Database";
                statusEl.className = "konek";
            } else {
                statusEl.textContent = "🔴 Terputus dari Server (Periksa Internet)";
                statusEl.className = "diskonek";
            }
        });

        const teams = [
            { id: 'A', name: 'REGU A', class: 'hdr-a' },
            { id: 'B', name: 'REGU B', class: 'hdr-b' },
            { id: 'C', name: 'REGU C', class: 'hdr-c' },
            { id: 'D', name: 'REGU D', class: 'hdr-d' }
        ];
        const babaks = [
            { id: 'p', name: 'PEMERATAAN' },
            { id: 'l', name: 'LEMPAR' },
            { id: 'r', name: 'REBUTAN' }
        ];

        let tableData = {};
        let currentTotals = { A: 0, B: 0, C: 0, D: 0 };

        function buildControlPanel() {
            let html = '';
            teams.forEach(team => {
                html += `<div class="team-ctrl"><h3 class="${team.class}">${team.name}</h3><div class="babak-container">`;
                
                // Menerapkan logika tombol khusus berdasarkan ID babak (p, l, r)
                babaks.forEach(babak => {
                    html += `<div class="babak-col"><div class="babak-title">${babak.name}</div>`;
                    
                    if (babak.id === 'p') {
                        // 1. PEMERATAAN: Munculkan nilai 100, 75, 50, dan 25 (Hanya Positif)
                        html += `
                            <div class="btn-row-full"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 100)">100</button></div>
                            <div class="btn-row-full"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 75)">75</button></div>
                            <div class="btn-row-full"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 50)">50</button></div>
                            <div class="btn-row-full"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 25)">25</button></div>`;
                            
                    } else if (babak.id === 'l') {
                        // 2. LEMPAR: Hanya ada nilai +50/-50, dan +25/-25
                        html += `
                            <div class="btn-row"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 50)">50</button><button class="s-btn b-min" onclick="setScore('${team.id}', '${babak.id}', -50)">-50</button></div>
                            <div class="btn-row"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 25)">25</button><button class="s-btn b-min" onclick="setScore('${team.id}', '${babak.id}', -25)">-25</button></div>`;
                            
                    } else if (babak.id === 'r') {
                        // 3. REBUTAN: Hanya ada nilai +100 dan -100
                        html += `
                            <div class="btn-row"><button class="s-btn b-plus" onclick="setScore('${team.id}', '${babak.id}', 100)">100</button><button class="s-btn b-min" onclick="setScore('${team.id}', '${babak.id}', -100)">-100</button></div>`;
                    }
                    
                    html += `<button class="s-btn b-del" onclick="setScore('${team.id}', '${babak.id}', '')">Hapus</button></div>`;
                });
                
                html += `</div></div>`;
            });
            document.getElementById('teamsContainer').innerHTML = html;
        }

        function buildPreviewTable() {
            let html = '';
            teams.forEach(team => {
                html += `<div class="preview-wrapper"><div class="preview-header ${team.class}">${team.name}</div><table><thead><tr><th>NO.</th><th>PEMERATAAN</th><th>LEMPAR</th><th>REBUTAN</th></tr></thead><tbody>`;
                for (let i = 1; i <= 14; i++) {
                    html += `<tr><td class="col-no">${i}</td>`;
                    babaks.forEach(b => { html += `<td class="val-cell" id="preview-${team.id}-${i}-${b.id}"></td>`; });
                    html += `</tr>`;
                }
                html += `<tr class="total-row"><td colspan="2">TOTAL:</td><td colspan="2" id="preview-total-${team.id}" style="color:#c00000; font-size: 20px;">0</td></tr></tbody></table></div>`;
            });
            document.getElementById('previewContainer').innerHTML = html;
        }

        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.tableData) {
                tableData = data.tableData;
                currentTotals = data.totals || { A: 0, B: 0, C: 0, D: 0 };
            } else {
                tableData = {};
                currentTotals = { A: 0, B: 0, C: 0, D: 0 };
            }
            renderPreview(tableData, currentTotals);
        });

        dbHistory.on('value', (snapshot) => {
            const dropdown = document.getElementById('daftarSesi');
            dropdown.innerHTML = '<option value="">-- Pilih Data Lama Untuk Ditampilkan --</option>';
            if (snapshot.exists()) {
                snapshot.forEach((child) => {
                    let opt = document.createElement('option');
                    opt.value = child.key;
                    opt.text = child.key; 
                    dropdown.appendChild(opt);
                });
            }
        });

        function setScore(teamId, babakId, value) {
            if (value === '') {
                for (let i = 14; i >= 1; i--) {
                    let key = `input-${teamId}-${i}-${babakId}`;
                    if (tableData[key] !== undefined) { delete tableData[key]; break; }
                }
            } else {
                let inserted = false;
                for (let i = 1; i <= 14; i++) {
                    let key = `input-${teamId}-${i}-${babakId}`;
                    if (tableData[key] === undefined) { tableData[key] = value; inserted = true; break; }
                }
                if (!inserted) { alert(`Kolom ${babakId.toUpperCase()} untuk Regu ${teamId} sudah penuh!`); return; }
            }
            pushToServer();
        }

        function pushToServer() {
            let totals = { A: 0, B: 0, C: 0, D: 0 };
            for (let key in tableData) {
                let val = parseInt(tableData[key]);
                let team = key.split('-')[1];
                if (!isNaN(val)) totals[team] += val;
            }
            dbRef.set({ tableData: tableData, totals: totals });
        }

        function renderPreview(data, totals) {
            document.querySelectorAll('.val-cell').forEach(c => c.innerText = '');
            for (let key in data) {
                let previewKey = key.replace('input', 'preview'); 
                let cell = document.getElementById(previewKey);
                if (cell) cell.innerText = data[key];
            }
            if (totals) {
                teams.forEach(team => {
                    let totalEl = document.getElementById(`preview-total-${team.id}`);
                    if (totalEl) totalEl.innerText = totals[team.id];
                });
            }
        }

        function simpanSesiPertandingan() {
            let namaSesi = prompt("Silakan ketik nama perlombaan/sesi ini (Contoh: Babak Penyisihan 1):");
            if (namaSesi != null && namaSesi.trim() !== "") {
                let idSesi = namaSesi.replace(/[.#$[\]]/g, ""); 
                dbHistory.child(idSesi).set({
                    tableData: tableData,
                    totals: currentTotals,
                    waktuSimpan: new Date().toLocaleString()
                }).then(() => {
                    alert('✅ Data "' + idSesi + '" berhasil disimpan ke memori!');
                }).catch(err => {
                    alert('Gagal menyimpan: ' + err.message);
                });
            }
        }

        function muatSesiPertandingan() {
            let idSesi = document.getElementById('daftarSesi').value;
            if (idSesi === "") {
                alert("Silakan pilih dulu nama sesi yang ingin ditampilkan dari kotak di sebelah kiri.");
                return;
            }
            
            if (confirm('Yakin ingin menampilkan data "' + idSesi + '" ke layar proyektor sekarang? \n\n(Ini akan menimpa angka yang sedang tayang saat ini)')) {
                dbHistory.child(idSesi).once('value').then(snap => {
                    if (snap.exists()) {
                        let dataLama = snap.val();
                        dbRef.set({
                            tableData: dataLama.tableData || {},
                            totals: dataLama.totals || { A: 0, B: 0, C: 0, D: 0 }
                        }).then(() => {
                            alert('Tampilan sukses diganti ke "' + idSesi + '"!');
                        });
                    }
                });
            }
        }

        function resetAll() {
            if(confirm('Yakin ingin mereset seluruh skor menjadi KOSONG? \n\nPastikan Anda sudah menyimpan sesi ini jika masih dibutuhkan.')) {
                dbRef.set({ tableData: {}, totals: { A: 0, B: 0, C: 0, D: 0 } });
            }
        }

        buildControlPanel();
        buildPreviewTable();

        let wakeLock = null;
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        };
        requestWakeLock();
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });
    </script>
</body>
</html>
